# Sample nginx config for host reverse-proxying to the Rails app container
# Place this on the VPS in /etc/nginx/sites-available/ and symlink into sites-enabled
# Replace `court.mavoid.com` with your domain and set the correct upstream port (HOST_PORT)

upstream court_management_app {
    server 127.0.0.1:3090;  # HOST port mapped to the app container
    keepalive 16;
}

server {
    listen 80;
    server_name court.mavoid.com court.mavoid.com;

    # Redirect HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Healthcheck endpoint (optional)
    location = /up {
        access_log off;
        return 200 'ok';
    }
}

server {
    listen 443 ssl http2;
    server_name court.mavoid.com court.mavoid.com;

    # TLS certificate paths (letsencrypt court.mavoid)
    ssl_certificate /etc/letsencrypt/live/court.mavoid.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/court.mavoid.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Increase header and body size limits as needed
    client_max_body_size 50M;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;

        proxy_pass http://court_management_app;
    }

    # Exempt healthcheck from redirects and heavy logs
    location = /up {
        access_log off;
        return 200 'ok';
    }

    # Optional: serve static assets directly from host if you copy them to /var/www/court_management_system/public
    # location /assets/ {
    #   alias /var/www/court_management_system/public/assets/;
    #   access_log off;
    #   add_header Cache-Control "public, max-age=31536000";
    # }
}
