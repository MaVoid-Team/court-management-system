# Nginx config for court.mavoid.com
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled

upstream court_management_app {
    server 127.0.0.1:3090;
    keepalive 16;
}

upstream court_management_frontend {
    server 127.0.0.1:3091;
    keepalive 16;
}

server {
    listen 80;
    server_name court.mavoid.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name court.mavoid.com;

    ssl_certificate /etc/letsencrypt/live/court.mavoid.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/court.mavoid.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Rails API
    location /api/ {
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_pass http://court_management_app;
    }

    # Next.js frontend
    location / {
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_pass http://court_management_frontend;
    }

    location = /up {
        access_log off;
        proxy_pass http://court_management_app;
    }
}
