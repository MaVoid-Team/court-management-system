services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-court_mgmt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-court_management_system_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5488:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-court_mgmt} -d ${DB_NAME:-court_management_system_production}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    volumes:
      - ./config/master.key:/app/config/master.key:ro
      - storage_data:/app/storage
    environment:
      RAILS_ENV: production
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME:-court_mgmt}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-court_management_system_production}
      REDIS_URL: redis://redis:6379/0
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      PORT: ${PORT:-3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://court.mavoid.com}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-}
    ports:
      - "3090:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    command: >
      bash -c "bundle exec rails db:prepare && bundle exec puma -C config/puma.rb"

  sidekiq:
    build: .
    env_file: .env
    volumes:
      - ./config/master.key:/app/config/master.key:ro
      - storage_data:/app/storage
    environment:
      RAILS_ENV: production
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME:-court_mgmt}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-court_management_system_production}
      REDIS_URL: redis://redis:6379/0
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      SIDEKIQ_CONCURRENCY: ${SIDEKIQ_CONCURRENCY:-5}
      JOB_CONCURRENCY: ${JOB_CONCURRENCY:-1}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bundle exec sidekiq -C config/sidekiq.yml

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3091:3000"
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  storage_data:
