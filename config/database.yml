default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: court_management_system_development

test:
  <<: *default
  database: court_management_system_test

production:
  <<: *default
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  database: <%= ENV.fetch("DB_NAME", "court_management_system_production") %>
  username: <%= ENV.fetch("DB_USERNAME", "court_management_system") %>
  password: <%= ENV["DB_PASSWORD"] %>
